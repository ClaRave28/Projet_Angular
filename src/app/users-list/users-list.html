<div class="container mt-5">
  <div class="card shadow-sm">
    <div class="card-header bg-info text-white d-flex align-items-center justify-content-between">
      <h4 class="mb-0">Users</h4>
      <button class="btn btn-light btn-sm rounded-pill" routerLink="/sign-in">Add User</button>
    </div>
    <div class="card-body p-3">
      <ag-grid-angular
        style="width: 100%; height: 600px;"
        class="ag-theme-alpine custom-grid"
        [rowData]="rowData"
        [columnDefs]="columnDefs"
        [defaultColDef]="defaultColDef"
        [pagination]="true"
        [paginationPageSize]="20"
        [context]="context"
      ></ag-grid-angular>
    </div>
  </div>
</div>

@if(isEditPopupOpen){
<div class="popup-backdrop" >
  <div class="popup-content">
    <h5>Edit User</h5>

    <form [formGroup]="editForm">

      <input formControlName="firstName" placeholder="First Name" class="form-control mb-2">
      <input formControlName="lastName" placeholder="Last Name" class="form-control mb-2">
      <input formControlName="age" type="number" placeholder="Age" class="form-control mb-2">
      <input formControlName="email" placeholder="Email" class="form-control mb-2">

    </form>

    <div class="d-flex justify-content-end gap-2 mt-2">
      <button class="btn btn-secondary" (click)="closeEditPopup()">Cancel</button>
      <button class="btn btn-primary" (click)="saveEdit()">Save</button>
    </div>
  </div>
</div>
}
