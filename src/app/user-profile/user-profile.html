<div class="container mt-5 d-flex justify-content-center">
  @if(isConnect()){


    <div class="card shadow-sm p-4" style="width: 350px;">
      <h3 class="card-title text-center mb-3">Profil utilisateur</h3>

      <div class="mb-2"><strong>Nom :</strong> {{ user?.lastName }}</div>
      <div class="mb-2"><strong>Prénom :</strong> {{ user?.firstName }}</div>
      <div class="mb-3"><strong>Email :</strong> {{ user?.email }}</div>

      <button class="btn btn-outline-danger w-100 rounded-pill" (click)="deconect()">
        Déconnexion
      </button>
    </div>

}@else{
      <div class="card shadow-sm p-4" style="width: 350px;">
        <h3 class="card-title text-center mb-3">Se connecter</h3>

        <form [formGroup]="loginForm" (ngSubmit)="submit()">

          <div class="mb-3">
            <label for="email" class="form-label">Email :</label>
            <input id="email" type="email" formControlName="email" class="form-control" placeholder="Entrez votre email" />
          </div>

          <button type="submit" class="btn btn-primary w-100 rounded-pill" [disabled]="loginForm.invalid">
            Se connecter
          </button>

        </form>
      </div>
}
</div>
